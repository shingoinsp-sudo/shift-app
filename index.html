<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shift Sheet</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 16px;
  background: #fff;
}

/* 上部 */
.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

input, button {
  padding: 4px 8px;
  border: 1px solid #ccc;
  background: #fff;
  font-size: 12px;
}

/* テーブル */
.wrapper {
  border: 1px solid #ccc;
  overflow: auto;
  height: 70vh;
}

table {
  border-collapse: collapse;
  font-size: 12px;
}

th, td {
  border: 1px solid #e0e0e0;
  width: 40px;
  height: 32px;
  text-align: center;
  padding: 0;
}

th {
  background: #f5f5f5;
  font-weight: normal;
}

/* 固定 */
thead th {
  position: sticky;
  top: 0;
  z-index: 3;
}

.name {
  position: sticky;
  left: 0;
  background: #fff;
  width: 120px;
  text-align: left;
  padding-left: 6px;
  z-index: 2;
}

/* ホバー */
td:hover {
  background: #f1f3f4;
}

/* 状態 */
.present {
  background: #e8f0fe;
  font-weight: bold;
}

.absent {
  color: #aaa;
}

/* 今日 */
.today {
  outline: 2px solid #4285f4;
}

/* 備考表示 */
.note-panel {
  margin-top: 6px;
  font-size: 12px;
  color: #444;
}
</style>
</head>

<body>

<div class="header">
  <div>
    <input type="month" id="month">
    <button onclick="addStaff()">＋</button>
  </div>
</div>

<div class="wrapper">
  <table id="table"></table>
</div>

<div class="note-panel" id="notePanel">備考：</div>

<script>
const defaultStaff = ["宮本","杉山","高盛","橋本","古志根"];

let staff = JSON.parse(localStorage.getItem("staff")) || defaultStaff;
let shifts = JSON.parse(localStorage.getItem("shifts")) || {};
let notes = JSON.parse(localStorage.getItem("notes")) || {};

function save(){
  localStorage.setItem("staff", JSON.stringify(staff));
  localStorage.setItem("shifts", JSON.stringify(shifts));
  localStorage.setItem("notes", JSON.stringify(notes));
}

function addStaff(){
  const name = prompt("名前");
  if(!name) return;
  staff.push(name);
  save();
  render();
}

function toggle(key){
  const order = ["", "●", "×"];
  const current = shifts[key] || "";
  const next = order[(order.indexOf(current)+1)%order.length];
  shifts[key] = next;
  save();
  render();
}

function showNote(key){
  document.getElementById("notePanel").innerText =
    "備考：" + (notes[key] || "なし");
}

function editNote(key){
  const val = prompt("備考入力", notes[key] || "");
  if(val !== null){
    notes[key] = val;
    save();
    render();
  }
}

function render(){
  const table = document.getElementById("table");
  table.innerHTML = "";

  const month = document.getElementById("month").value;
  if(!month) return;

  const [y,m] = month.split("-");
  const days = new Date(y, m, 0).getDate();
  const week = ["日","月","火","水","木","金","土"];
  const today = new Date();

  let thead = "<thead><tr><th class='name'>名前</th>";

  for(let d=1; d<=days; d++){
    const dateObj = new Date(y, m-1, d);
    const w = week[dateObj.getDay()];
    const isToday =
      today.getFullYear()==y &&
      today.getMonth()+1==m &&
      today.getDate()==d ? "today" : "";

    thead += `<th class="${isToday}">
      ${d}<br>${w}
    </th>`;
  }

  thead += "</tr></thead>";
  table.innerHTML += thead;

  let tbody = "<tbody>";

  staff.forEach(name=>{
    tbody += `<tr><td class="name">${name}</td>`;

    for(let d=1; d<=days; d++){
      const date = `${month}-${String(d).padStart(2,'0')}`;
      const key = name+"_"+date;
      const val = shifts[key] || "";

      tbody += `
      <td class="${val==='●'?'present':''}"
        onclick="toggle('${key}')"
        onmouseover="showNote('${key}')"
        ondblclick="editNote('${key}')">
        ${val}
      </td>`;
    }

    tbody += "</tr>";
  });

  tbody += "</tbody>";
  table.innerHTML += tbody;
}

window.onload = ()=>{
  const now = new Date().toISOString().slice(0,7);
  document.getElementById("month").value = now;
  render();
};

document.getElementById("month").onchange = render;
</script>

</body>
</html>
