<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shift Board</title>

<style>
:root{
  --border:#e5e7eb;
  --bg:#f8fafc;
  --card:#fff;
  --text:#111827;
  --sub:#6b7280;
  --accent:#2563eb;
}

body{
  margin:0;
  padding:16px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}

.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.title{
  font-weight:600;
  font-size:18px;
}

.controls{
  display:flex;
  gap:8px;
}

input,button{
  border:1px solid var(--border);
  padding:6px 10px;
  border-radius:6px;
  background:#fff;
  font-size:13px;
}

.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}

/* PC */
.wrapper{
  overflow:auto;
  max-height:65vh;
}

table{
  border-collapse:collapse;
  width:100%;
  min-width:1100px;
}

th,td{
  border:1px solid var(--border);
  text-align:center;
  font-size:12px;
  height:40px;
  width:40px;
}

thead th{
  position:sticky;
  top:0;
  background:#f9fafb;
  color:var(--sub);
  font-weight:500;
}

.name{
  position:sticky;
  left:0;
  background:#fff;
  text-align:left;
  padding-left:10px;
  width:130px;
  font-weight:600;
}

/* ● */
.present{
  background:var(--accent);
  color:#fff;
  font-weight:600;
  border-radius:4px;
}

/* ===== スマホ ===== */
@media(max-width:768px){
  .wrapper{display:none;}

  .mobile-card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    margin-bottom:10px;
    padding:10px;
  }

  .staff{
    font-weight:600;
    margin-bottom:8px;
  }

  .row{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid #f1f5f9;
    font-size:13px;
  }
}

/* footer */
.footer{
  margin-top:10px;
  display:grid;
  gap:10px;
}

.spec,.note{
  font-size:12px;
  color:var(--sub);
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Shift Board</div>
  <input type="month" id="month">
</div>

<div class="card">
  <div class="wrapper">
    <table id="table"></table>
  </div>

  <div id="mobile"></div>
</div>

<div class="footer">
  <div class="spec">
    ■ 仕様<br>
    ・PC：月表示<br>
    ・スマホ：1週間表示<br>
    ・クリック：●/×切替<br>
    ・ダブルクリック：備考入力<br>
    ・土日祝：自動×
  </div>

  <div class="note" id="notePanel">
    備考：未選択
  </div>
</div>

<script>
const staff=["宮本","杉山","高盛","橋本","古志根"];

let shifts={};
let notes={};
let holidays=new Set();

/* 祝日 */
async function loadHolidays(){
  try{
    const res=await fetch("https://holidays-jp.github.io/api/v1/date.json");
    const data=await res.json();
    holidays=new Set(Object.keys(data));
  }catch(e){}
}

/* 判定 */
function isHoliday(date){
  const d=new Date(date);
  return d.getDay()===0 || d.getDay()===6 || holidays.has(date);
}

/* toggle */
function toggle(key,date){
  if(isHoliday(date))return;

  const order=["","●","×"];
  const cur=shifts[key]||"";
  shifts[key]=order[(order.indexOf(cur)+1)%order.length];
  render();
}

/* 備考 */
function showNote(key){
  document.getElementById("notePanel").innerText=
    "備考："+(notes[key]||"なし");
}

function editNote(key){
  const v=prompt("備考",notes[key]||"");
  if(v!==null){
    notes[key]=v;
    render();
  }
}

/* 週 */
function getWeek(){
  const today=new Date();
  const arr=[];
  for(let i=-3;i<=3;i++){
    const d=new Date(today);
    d.setDate(today.getDate()+i);

    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,'0');
    const dd=String(d.getDate()).padStart(2,'0');

    arr.push(`${y}-${m}-${dd}`);
  }
  return arr;
}

/* ================= PC ================= */
function renderPC(){
  document.getElementById("mobile").innerHTML="";
  document.querySelector(".wrapper").style.display="block";

  const table=document.getElementById("table");
  table.innerHTML="";

  const month=document.getElementById("month").value;
  if(!month)return;

  const [y,m]=month.split("-");
  const days=new Date(y,m,0).getDate();

  let html="<thead><tr><th class='name'>名前</th>";

  for(let i=1;i<=days;i++){
    html+=`<th>${i}</th>`;
  }

  html+="</tr></thead><tbody>";

  staff.forEach(n=>{
    html+=`<tr><td class='name'>${n}</td>`;

    for(let i=1;i<=days;i++){
      const date=`${month}-${String(i).padStart(2,'0')}`;
      const key=n+"_"+date;

      let v=shifts[key]||"";
      if(isHoliday(date)) v="×";

      html+=`<td onclick="toggle('${key}','${date}')"
        ondblclick="editNote('${key}')"
        onmouseover="showNote('${key}')">
        <span class="${v==='●'?'present':''}">${v}</span>
      </td>`;
    }

    html+="</tr>";
  });

  html+="</tbody>";
  table.innerHTML=html;
}

/* ================= スマホ ================= */
function renderMobile(){
  document.querySelector(".wrapper").style.display="none";

  const wrap=document.getElementById("mobile");
  wrap.innerHTML="";

  const week=getWeek();

  staff.forEach(n=>{
    let card=`<div class="mobile-card">
      <div class="staff">${n}</div>`;

    week.forEach(date=>{
      const key=n+"_"+date;
      let v=shifts[key]||"";

      if(isHoliday(date)) v="×";

      const d=new Date(date);
      const label=`${d.getMonth()+1}/${d.getDate()}`;

      card+=`
        <div class="row"
          onclick="toggle('${key}','${date}')"
          ondblclick="editNote('${key}')">
          <div>${label}</div>
          <div class="${v==='●'?'present':''}">${v||"ー"}</div>
        </div>`;
    });

    card+="</div>";
    wrap.innerHTML+=card;
  });
}

/* render */
function render(){
  if(window.innerWidth<=768) renderMobile();
  else renderPC();
}

/* init */
window.onload=async()=>{
  document.getElementById("month").value=
    new Date().toISOString().slice(0,7);

  await loadHolidays();
  render();
};

window.onresize=render;
document.getElementById("month").onchange=render;
</script>

</body>
</html>
