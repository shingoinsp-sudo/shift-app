<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シフト表</title>
<style>
body { font-family: Arial; margin:20px; }
table { border-collapse: collapse; width:100%; }
th, td {
  border:1px solid #ccc;
  text-align:center;
  padding:5px;
  font-size:12px;
}
input {
  width:100%;
  border:none;
  text-align:center;
}

.work { background:#cce5ff; }
.off { background:#eee; }

</style>
</head>
<body>

<h2>派遣シフト表</h2>

<input type="month" id="month" onchange="render()">
<button onclick="addStaff()">スタッフ追加</button>
<button onclick="downloadCSV()">CSV</button>

<table id="table"></table>

<script>
let staff = JSON.parse(localStorage.getItem("staff")) || ["スタッフ1","スタッフ2"];
let shifts = JSON.parse(localStorage.getItem("shifts")) || {};

function save() {
  localStorage.setItem("staff", JSON.stringify(staff));
  localStorage.setItem("shifts", JSON.stringify(shifts));
}

function addStaff() {
  const name = prompt("名前入力");
  if (!name) return;
  staff.push(name);
  save();
  render();
}

function render() {
  const table = document.getElementById("table");
  table.innerHTML = "";

  const month = document.getElementById("month").value;
  if (!month) return;

  const [y,m] = month.split("-");
  const days = new Date(y, m, 0).getDate();

  let header = "<tr><th>名前</th>";
  for(let d=1; d<=days; d++) header += `<th>${d}</th>`;
  header += "</tr>";
  table.innerHTML += header;

  staff.forEach(name=>{
    let row = `<tr><td>${name}</td>`;
    for(let d=1; d<=days; d++){
      const date = `${month}-${String(d).padStart(2,'0')}`;
      const key = name+"_"+date;
      const val = shifts[key] || "";

      row += `<td>
        <input value="${val}" 
          onchange="update('${key}', this.value)" 
          class="${getClass(val)}">
      </td>`;
    }
    row += "</tr>";
    table.innerHTML += row;
  });
}

function update(key,val){
  shifts[key] = val;
  save();
  render();
}

function getClass(val){
  if(val.includes("休")) return "off";
  if(val) return "work";
  return "";
}

function downloadCSV(){
  let csv="名前,日付,シフト\n";
  for(let key in shifts){
    const [name,date] = key.split("_");
    csv += `${name},${date},${shifts[key]}\n`;
  }
  const blob = new Blob([csv], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download="shift.csv";
  a.click();
}
</script>

</body>
</html>
