<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シフト管理</title>
<style>
body { font-family:sans-serif; margin:20px; }

.top {
  margin-bottom:10px;
}

.container {
  overflow-x:auto;
  border:1px solid #ccc;
}

table {
  border-collapse: collapse;
  min-width: 1400px;
}

th, td {
  border:1px solid #ddd;
  text-align:center;
  padding:6px;
}

th {
  background:#f5f5f5;
  font-size:12px;
}

.name {
  position: sticky;
  left:0;
  background:#fff;
  font-weight:bold;
  width:120px;
  z-index:2;
}

.count {
  background:#fafafa;
  font-size:11px;
}

.cell {
  width:60px;
  height:40px;
  cursor:pointer;
}

/* 色 */
.early { background:#81d4fa; }
.late { background:#ffcc80; }
.off { background:#eee; color:#aaa; }

.weekend { background:#fdecea; }
.today { outline:2px solid red; }

.alert {
  background:#ff5252 !important;
  color:#fff;
}

.legend {
  margin:10px 0;
}
</style>
</head>
<body>

<h2>派遣シフト管理</h2>

<div class="top">
  <input type="month" id="month">
  <button onclick="addStaff()">スタッフ追加</button>
  <button onclick="downloadCSV()">CSV</button>
</div>

<div class="legend">
  早=早番 / 遅=遅番 / 休=休み（クリックで切替）
</div>

<div class="container">
<table id="table"></table>
</div>

<script>
const defaultStaff = ["宮本","杉山","高盛","橋本","古志根"];
let staff = JSON.parse(localStorage.getItem("staff")) || defaultStaff;
let shifts = JSON.parse(localStorage.getItem("shifts")) || {};

const MIN_REQUIRED = 2; // 必要人数

function save(){
  localStorage.setItem("staff", JSON.stringify(staff));
  localStorage.setItem("shifts", JSON.stringify(shifts));
}

function addStaff(){
  const name = prompt("スタッフ名");
  if(!name) return;
  staff.push(name);
  save();
  render();
}

function toggle(key, el){
  const order = ["", "早", "遅", "休"];
  let current = shifts[key] || "";
  let next = order[(order.indexOf(current)+1) % order.length];

  shifts[key] = next;
  el.textContent = next;
  el.className = "cell " + getClass(next);

  save();
  render(); // 人数更新のため
}

function getClass(val){
  if(val==="早") return "early";
  if(val==="遅") return "late";
  if(val==="休") return "off";
  return "";
}

function render(){
  const table = document.getElementById("table");
  table.innerHTML = "";

  const month = document.getElementById("month").value;
  if(!month) return;

  const [y,m] = month.split("-");
  const days = new Date(y, m, 0).getDate();

  const week = ["日","月","火","水","木","金","土"];
  const today = new Date();

  // 人数カウント
  let countMap = {};

  staff.forEach(name=>{
    for(let d=1; d<=days; d++){
      const date = `${month}-${String(d).padStart(2,'0')}`;
      const key = name+"_"+date;
      if(shifts[key] && shifts[key] !== "休"){
        countMap[date] = (countMap[date] || 0) + 1;
      }
    }
  });

  // header
  let header = "<tr><th class='name'>名前</th>";

  for(let d=1; d<=days; d++){
    const date = `${month}-${String(d).padStart(2,'0')}`;
    const dateObj = new Date(y, m-1, d);
    const w = week[dateObj.getDay()];
    const isWeekend = (w==="土"||w==="日") ? "weekend" : "";
    const isToday =
      today.getFullYear()==y &&
      (today.getMonth()+1)==m &&
      today.getDate()==d ? "today" : "";

    const count = countMap[date] || 0;
    const alert = count < MIN_REQUIRED ? "alert" : "";

    header += `<th class="${isWeekend} ${isToday} ${alert}">
      ${d}<br>${w}<br>
      <span class="count">${count}人</span>
    </th>`;
  }

  header += "</tr>";
  table.innerHTML += header;

  // rows
  staff.forEach(name=>{
    let row = `<tr><td class="name">${name}</td>`;

    for(let d=1; d<=days; d++){
      const date = `${month}-${String(d).padStart(2,'0')}`;
      const key = name+"_"+date;
      const val = shifts[key] || "";

      row += `<td class="cell ${getClass(val)}"
        onclick="toggle('${key}', this)">
        ${val}
      </td>`;
    }

    row += "</tr>";
    table.innerHTML += row;
  });
}

function downloadCSV(){
  let csv = "名前,日付,シフト\n";
  for(let key in shifts){
    const [name,date] = key.split("_");
    csv += `${name},${date},${shifts[key]}\n`;
  }

  const blob = new Blob([csv], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "shift.csv";
  a.click();
}

window.onload = ()=>{
  const now = new Date().toISOString().slice(0,7);
  document.getElementById("month").value = now;
  render();
};

document.getElementById("month").onchange = render;
</script>

</body>
</html>
