<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Attendance Board</title>

<style>
:root {
  --border: #e5e7eb;
  --text: #111827;
  --muted: #9ca3af;
  --bg: #ffffff;
  --hover: #f9fafb;
  --accent: #111;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 24px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.title {
  font-size: 20px;
  font-weight: 600;
}

.controls {
  display: flex;
  gap: 8px;
}

input, button {
  border: 1px solid var(--border);
  background: #fff;
  padding: 6px 10px;
  font-size: 13px;
}

button:hover {
  background: var(--hover);
  cursor: pointer;
}

/* Table */
.wrapper {
  border: 1px solid var(--border);
  overflow-x: auto;
}

table {
  border-collapse: collapse;
  min-width: 1200px;
}

th, td {
  border: 1px solid var(--border);
  text-align: center;
  padding: 6px;
}

th {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  background: #fafafa;
}

.name {
  position: sticky;
  left: 0;
  background: #fff;
  font-weight: 600;
  width: 140px;
  text-align: left;
  padding-left: 12px;
}

/* Cell */
.cell {
  width: 52px;
  height: 42px;
  cursor: pointer;
  transition: background 0.15s;
}

.cell:hover {
  background: var(--hover);
}

/* States */
.present {
  font-weight: 600;
}

.absent {
  color: var(--muted);
}

.today {
  border-bottom: 2px solid var(--accent);
}

.weekend {
  color: var(--muted);
}

/* Note indicator */
.note-dot {
  width: 4px;
  height: 4px;
  background: #111;
  border-radius: 50%;
  margin: 4px auto 0;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Attendance</div>
  <div class="controls">
    <input type="month" id="month">
    <button onclick="addStaff()">Add</button>
  </div>
</div>

<div class="wrapper">
  <table id="table"></table>
</div>

<script>
const defaultStaff = ["宮本","杉山","高盛","橋本","古志根"];

let staff = JSON.parse(localStorage.getItem("staff")) || defaultStaff;
let shifts = JSON.parse(localStorage.getItem("shifts")) || {};
let notes = JSON.parse(localStorage.getItem("notes")) || {};

function save(){
  localStorage.setItem("staff", JSON.stringify(staff));
  localStorage.setItem("shifts", JSON.stringify(shifts));
  localStorage.setItem("notes", JSON.stringify(notes));
}

function addStaff(){
  const name = prompt("名前");
  if(!name) return;
  staff.push(name);
  save();
  render();
}

function toggle(key){
  const order = ["", "●", "×"];
  const current = shifts[key] || "";
  const next = order[(order.indexOf(current)+1)%order.length];
  shifts[key] = next;
  save();
  render();
}

function editNote(key){
  const val = prompt("備考", notes[key] || "");
  if(val !== null){
    notes[key] = val;
    save();
    render();
  }
}

function render(){
  const table = document.getElementById("table");
  table.innerHTML = "";

  const month = document.getElementById("month").value;
  if(!month) return;

  const [y,m] = month.split("-");
  const days = new Date(y, m, 0).getDate();
  const week = ["日","月","火","水","木","金","土"];
  const today = new Date();

  let header = "<tr><th class='name'>Name</th>";

  for(let d=1; d<=days; d++){
    const date = new Date(y, m-1, d);
    const w = week[date.getDay()];
    const isToday =
      today.getFullYear()==y &&
      today.getMonth()+1==m &&
      today.getDate()==d ? "today" : "";
    const isWeekend = (w==="土"||w==="日") ? "weekend" : "";

    header += `<th class="${isToday} ${isWeekend}">
      ${d}<br>${w}
    </th>`;
  }

  header += "</tr>";
  table.innerHTML += header;

  staff.forEach(name=>{
    let row = `<tr><td class="name">${name}</td>`;

    for(let d=1; d<=days; d++){
      const date = `${month}-${String(d).padStart(2,'0')}`;
      const key = name+"_"+date;
      const val = shifts[key] || "";
      const note = notes[key];

      row += `
      <td class="cell" onclick="toggle('${key}')" ondblclick="editNote('${key}')">
        <div class="${val==='●'?'present':'absent'}">${val}</div>
        ${note ? `<div class="note-dot"></div>` : ""}
      </td>`;
    }

    row += "</tr>";
    table.innerHTML += row;
  });
}

window.onload = ()=>{
  const now = new Date().toISOString().slice(0,7);
  document.getElementById("month").value = now;
  render();
};

document.getElementById("month").onchange = render;
</script>

</body>
</html>
