<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shift Dashboard</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f7f7f8;
  margin: 0;
  padding: 20px;
}

/* header */
.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.title {
  font-size: 20px;
  font-weight: 600;
}

.controls {
  display: flex;
  gap: 10px;
}

input, button {
  padding: 6px 10px;
  border: 1px solid #ddd;
  background: #fff;
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}

/* card */
.card {
  background: #fff;
  border: 1px solid #eee;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.03);
}

.name {
  font-weight: 600;
  margin-bottom: 10px;
}

/* calendar */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  font-size: 11px;
  text-align: center;
  color: #aaa;
}

.cell {
  width: 100%;
  aspect-ratio: 1/1;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  transition: 0.2s;
}

.cell:hover {
  background: #f0f0f0;
}

.circle {
  width: 20px;
  height: 20px;
  border-radius: 50%;
}

.present { background: #111; }
.absent { border: 2px solid #ccc; }

.note {
  position: absolute;
  bottom: 2px;
  right: 4px;
  font-size: 10px;
  color: #999;
}

/* tooltip */
.tooltip {
  position: absolute;
  bottom: 110%;
  background: #111;
  color: #fff;
  padding: 4px 6px;
  font-size: 11px;
  border-radius: 4px;
  white-space: nowrap;
  display: none;
}

.cell:hover .tooltip {
  display: block;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">Shift Dashboard</div>
  <div class="controls">
    <input type="month" id="month">
    <button onclick="addStaff()">＋</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
const defaultStaff = ["宮本","杉山","高盛","橋本","古志根"];
let staff = JSON.parse(localStorage.getItem("staff")) || defaultStaff;
let shifts = JSON.parse(localStorage.getItem("shifts")) || {};
let notes = JSON.parse(localStorage.getItem("notes")) || {};

function save(){
  localStorage.setItem("staff", JSON.stringify(staff));
  localStorage.setItem("shifts", JSON.stringify(shifts));
  localStorage.setItem("notes", JSON.stringify(notes));
}

function addStaff(){
  const name = prompt("名前");
  if(!name) return;
  staff.push(name);
  save();
  render();
}

function toggle(key){
  const order = ["", "●", "×"];
  const current = shifts[key] || "";
  const next = order[(order.indexOf(current)+1)%order.length];
  shifts[key] = next;
  save();
  render();
}

function editNote(key){
  const val = prompt("備考", notes[key] || "");
  if(val !== null){
    notes[key] = val;
    save();
    render();
  }
}

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const month = document.getElementById("month").value;
  if(!month) return;

  const [y,m] = month.split("-");
  const days = new Date(y, m, 0).getDate();

  staff.forEach(name=>{
    const card = document.createElement("div");
    card.className = "card";

    let html = `<div class="name">${name}</div>`;
    html += `<div class="calendar">`;

    for(let d=1; d<=days; d++){
      const date = `${month}-${String(d).padStart(2,'0')}`;
      const key = name+"_"+date;
      const val = shifts[key];
      const note = notes[key];

      html += `
      <div class="cell" 
        onclick="toggle('${key}')"
        ondblclick="editNote('${key}')">

        ${val==="●" ? `<div class="circle present"></div>` : ""}
        ${val==="×" ? `<div class="circle absent"></div>` : ""}
        
        ${note ? `<div class="note">※</div>
        <div class="tooltip">${note}</div>` : ""}

      </div>`;
    }

    html += `</div>`;
    card.innerHTML = html;

    grid.appendChild(card);
  });
}

window.onload = ()=>{
  const now = new Date().toISOString().slice(0,7);
  document.getElementById("month").value = now;
  render();
};

document.getElementById("month").onchange = render;
</script>

</body>
</html>
