<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shift Manager</title>

<style>
:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #111827;
  --sub: #6b7280;
  --accent: #2563eb;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 24px;
}

/* header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.title {
  font-size: 20px;
  font-weight: 600;
}

.controls {
  display: flex;
  gap: 8px;
}

input, button {
  border: 1px solid var(--border);
  background: #fff;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 13px;
}

button:hover {
  background: #f1f5f9;
}

/* card */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.03);
  overflow: hidden;
}

/* table */
.wrapper {
  overflow-x: auto;
}

table {
  border-collapse: collapse;
  min-width: 1200px;
  width: 100%;
}

th, td {
  border: 1px solid var(--border);
  text-align: center;
}

th {
  font-size: 11px;
  padding: 6px;
  background: #f9fafb;
  color: var(--sub);
}

.name {
  position: sticky;
  left: 0;
  background: #fff;
  font-weight: 600;
  width: 130px;
  text-align: left;
  padding-left: 12px;
}

/* cell */
.cell {
  width: 46px;
  height: 46px;
  cursor: pointer;
  position: relative;
  transition: 0.15s;
}

.cell:hover {
  background: #f1f5f9;
}

/* states */
.present {
  background: var(--accent);
  color: #fff;
  font-weight: 600;
}

.absent {
  color: #cbd5e1;
}

.today {
  outline: 2px solid var(--accent);
}

.weekend {
  background: #fafafa;
}

/* date */
.date {
  font-size: 10px;
  color: var(--sub);
}

/* note panel */
.note-panel {
  border-top: 1px solid var(--border);
  padding: 10px;
  font-size: 13px;
  color: var(--sub);
  background: #fcfcfd;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Shift Manager</div>
  <div class="controls">
    <input type="month" id="month">
    <button onclick="addStaff()">＋</button>
  </div>
</div>

<div class="card">
  <div class="wrapper">
    <table id="table"></table>
  </div>
  <div class="note-panel" id="notePanel">
    備考：セルにカーソルを合わせて確認
  </div>
</div>

<script>
const defaultStaff = ["宮本","杉山","高盛","橋本","古志根"];

let staff = JSON.parse(localStorage.getItem("staff")) || defaultStaff;
let shifts = JSON.parse(localStorage.getItem("shifts")) || {};
let notes = JSON.parse(localStorage.getItem("notes")) || {};

function save(){
  localStorage.setItem("staff", JSON.stringify(staff));
  localStorage.setItem("shifts", JSON.stringify(shifts));
  localStorage.setItem("notes", JSON.stringify(notes));
}

function addStaff(){
  const name = prompt("名前");
  if(!name) return;
  staff.push(name);
  save();
  render();
}

function toggle(key){
  const order = ["", "●", "×"];
  const current = shifts[key] || "";
  const next = order[(order.indexOf(current)+1)%order.length];
  shifts[key] = next;
  save();
  render();
}

function showNote(key){
  const text = notes[key] || "（備考なし）";
  document.getElementById("notePanel").innerText = "備考：" + text;
}

function editNote(key){
  const val = prompt("備考入力", notes[key] || "");
  if(val !== null){
    notes[key] = val;
    save();
    render();
  }
}

function render(){
  const table = document.getElementById("table");
  table.innerHTML = "";

  const month = document.getElementById("month").value;
  if(!month) return;

  const [y,m] = month.split("-");
  const days = new Date(y, m, 0).getDate();
  const week = ["日","月","火","水","木","金","土"];
  const today = new Date();

  let header = "<tr><th class='name'>名前</th>";

  for(let d=1; d<=days; d++){
    const dateObj = new Date(y, m-1, d);
    const w = week[dateObj.getDay()];
    const isToday =
      today.getFullYear()==y &&
      today.getMonth()+1==m &&
      today.getDate()==d ? "today" : "";

    const isWeekend = (w==="土"||w==="日") ? "weekend" : "";

    header += `<th class="${isToday} ${isWeekend}">
      <div>${d}</div>
      <div class="date">${w}</div>
    </th>`;
  }

  header += "</tr>";
  table.innerHTML += header;

  staff.forEach(name=>{
    let row = `<tr><td class="name">${name}</td>`;

    for(let d=1; d<=days; d++){
      const date = `${month}-${String(d).padStart(2,'0')}`;
      const key = name+"_"+date;
      const val = shifts[key] || "";

      row += `
      <td class="cell ${val==='●'?'present':''}" 
        onclick="toggle('${key}')"
        onmouseover="showNote('${key}')"
        ondblclick="editNote('${key}')">
        ${val}
      </td>`;
    }

    row += "</tr>";
    table.innerHTML += row;
  });
}

window.onload = ()=>{
  const now = new Date().toISOString().slice(0,7);
  document.getElementById("month").value = now;
  render();
};

document.getElementById("month").onchange = render;
</script>

</body>
</html>
